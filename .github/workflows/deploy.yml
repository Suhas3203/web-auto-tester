name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile app.py
          python -m py_compile web_auto_tester/__init__.py
          python -m py_compile web_auto_tester/__main__.py
          python -m py_compile web_auto_tester/runner.py
          python -m py_compile web_auto_tester/analyzers.py
          python -m py_compile web_auto_tester/discovery.py
          python -m py_compile web_auto_tester/models.py
          python -m py_compile web_auto_tester/report.py

      - name: Validate Dockerfile
        run: |
          docker build --check . 2>/dev/null || echo "Docker build check completed"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t web-auto-tester:test .

      - name: Test health endpoint
        run: |
          docker run -d --name test-container -p 10000:10000 web-auto-tester:test
          sleep 10
          curl -f http://localhost:10000/health || exit 1
          docker stop test-container

  # Render auto-deploys from main branch when connected.
  # This job just logs that deployment was triggered.
  deploy-notification:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deployment triggered
        run: |
          echo "================================================"
          echo "  Push to main detected."
          echo "  Render will auto-deploy via GitHub integration."
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "================================================"
