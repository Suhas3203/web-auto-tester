services:
  - type: web
    name: web-auto-tester
    runtime: docker
    repo: https://github.com/Suhas3203/web-auto-tester.git
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REPORTS_DIR
        value: /tmp/web-auto-tester-reports
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RENDER
        value: "true"
      - key: MALLOC_ARENA_MAX
        value: "2"
      # Set this to your free Neon (neon.tech) or Supabase PostgreSQL connection
      # string to persist reports across deploys. Leave unset to use SQLite
      # (resets on each deploy — not recommended for production).
      - key: DATABASE_URL
        sync: false   # secret — set manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
