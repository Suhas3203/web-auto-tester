services:
  - type: web
    name: web-auto-tester
    runtime: docker
    repo: https://github.com/Suhas3203/web-auto-tester.git
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REPORTS_DIR
        value: /tmp/web-auto-tester-reports
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RENDER
        value: "true"
      - key: MALLOC_ARENA_MAX
        value: "2"
      # Supabase connection string (Settings → Database → URI, port 6543 pooler).
      # Format: postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      # Set manually in Render dashboard — do NOT commit the real value.
      - key: DATABASE_URL
        sync: false   # secret — set in Render dashboard Environment tab
    healthCheckPath: /health
    autoDeploy: true
